name: Supply Chain Security

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  sbom:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM
        uses: anchore/sbom-action@v0

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Container
        run: |
          cosign sign --yes ghcr.io/${{ github.repository }}:latest
