name: Self-hosted CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-self-hosted-runner:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show runner environment
        shell: bash
        run: |
          set -euo pipefail
          echo "Runner: $RUNNER_NAME"
          echo "OS: $RUNNER_OS"
          echo "Arch: $RUNNER_ARCH"
          uname -a || true
          node --version || true
          npm --version || true
jobs:
  self_hosted:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Confirm runner
        run: echo "Self-hosted runner is active."
