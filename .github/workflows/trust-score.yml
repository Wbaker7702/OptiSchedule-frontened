name: Trust Score

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write
  issues: read
  security-events: read
  actions: read

jobs:
  calculate:
    runs-on: ubuntu-latest
    outputs:
      score: ${{ steps.score.outputs.score }}

    steps:
      - uses: actions/checkout@v4
      - name: Setup GH CLI
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Initialize Score
        id: score
        run: |
          SCORE=100

          echo "Base Score: $SCORE"

          # CI Status Check
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "CI assumed passing for now"
          fi

          # Count open issues labeled high
          HIGH_ISSUES=$(gh issue list --label "high" --state open --json number --jq length || echo 0)
          SCORE=$((SCORE - (HIGH_ISSUES * 10)))

          # Count security alerts (if any)
          ALERTS=0
          SCORE=$((SCORE - (ALERTS * 15)))

          if [ $SCORE -lt 0 ]; then SCORE=0; fi

          echo "Final Score: $SCORE"

          echo "score=$SCORE" >> $GITHUB_OUTPUT

      - name: Generate Badge
        run: |
          SCORE=${{ steps.score.outputs.score }}
          echo "![Trust Score](https://img.shields.io/badge/Trust%20Score-$SCORE-blue)" > TRUST_BADGE.md

      - name: Commit Badge
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add TRUST_BADGE.md
          git commit -m "Update Trust Score" || echo "No changes"
          git push || echo "No push needed"
