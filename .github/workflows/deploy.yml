name: Production Deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  check-trust:
    runs-on: ubuntu-latest
    outputs:
      score: ${{ steps.fetch.outputs.score }}

    steps:
      - uses: actions/checkout@v4

      - name: Read Trust Score
        id: fetch
        run: |
          if [ -f TRUST_BADGE.md ]; then
            SCORE=$(grep -o '[0-9]\+' TRUST_BADGE.md | head -1)
          else
            SCORE=0
          fi
          echo "score=$SCORE" >> $GITHUB_OUTPUT

  deploy:
    needs: check-trust
    runs-on: ubuntu-latest
    if: needs.check-trust.outputs.score >= 75

    environment:
      name: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        run: |
          echo "Trust Score acceptable."
          echo "Deploying to production..."
