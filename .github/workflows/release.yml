name: Semantic Release

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Bump Version
        run: |
          npm version patch -m "Release %s"

      - name: Push Tags
        run: git push --follow-tags
